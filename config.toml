[providers.deepseek]
api_key = "${DEEPSEEK_API_KEY}"
base_url = "${DEEPSEEK_BASE_URL}"
model = "deepseek-v3.2"
endpoint = "${DEEPSEEK_ENDPOINT:-/v1/chat/completions}"

[providers.deepseek_w8a8]
api_key = "${DEEPSEEK_W8A8_API_KEY}"
base_url = "${DEEPSEEK_W8A8_BASE_URL}"
model = "dsv3.1"
endpoint = "${DEEPSEEK_W8A8_ENDPOINT:-/v1/chat/completions}"

# Example: Add your own custom providers here
# [providers.custom_provider]
# api_key = "${CUSTOM_API_KEY}"
# base_url = "${CUSTOM_BASE_URL}"
# model = "model-name"
# endpoint = "${CUSTOM_ENDPOINT:-/v1/chat/completions}"

[providers.qwen]
api_key = "${QWEN_API_KEY}"
base_url = "${QWEN_BASE_URL}"
model = "qwen3.5-397b-a17b"
endpoint = "${QWEN_ENDPOINT:-/v1/chat/completions}"

[providers.gpt]
api_key = "${GPT_API_KEY}"
base_url = "${GPT_BASE_URL}"
model = "gpt-4o-mini"
endpoint = "${GPT_ENDPOINT:-/v1/chat/completions}"

[providers."qwen-vl"]
api_key = "${QWEN_VL_API_KEY}"
base_url = "${QWEN_VL_BASE_URL}"
model = "Qwen3-VL-235B-A22B-Instruct"
endpoint = "${QWEN_VL_ENDPOINT:-/v1/chat/completions}"

[providers.zhipu]
api_key = "${ZHIPU_API_KEY}"
base_url = "${ZHIPU_BASE_URL}"
model = "glm-4-flash"
endpoint = "${ZHIPU_ENDPOINT:-/api/paas/v4/chat/completions}"

[providers."zhipu-vl"]
api_key = "${ZHIPU_VL_API_KEY}"
base_url = "${ZHIPU_VL_BASE_URL}"
model = "glm-4v-flash"
endpoint = "${ZHIPU_VL_ENDPOINT:-/api/paas/v4/chat/completions}"

[provider_mappings.deepseek]
provider = "deepseek"
aliases = ["ds", "deepseek", "ds_ep", "ds-ep", "dsep"]
default_model = "deepseek-v3.2"
max_workers = 30
supports_post = true

[provider_mappings.deepseek.versions]
"3" = "deepseek-v3"
"3.1" = "deepseek-v3"
"3.2" = "deepseek-v3.2"
"v3" = "deepseek-v3"
"v3.1" = "deepseek-v3"
"v3.2" = "deepseek-v3.2"
"v3ep" = "deepseek-v3"
"v3.1ep" = "deepseek-v3"
"v3-ep" = "deepseek-v3"
"v3.1-ep" = "deepseek-v3"
"v3_ep" = "deepseek-v3"
"v3.1_ep" = "deepseek-v3"

[provider_mappings.deepseek_w8a8]
provider = "deepseek"
aliases = ["deepseek_w8a8", "w8a8", "dsw8a8", "ds_w8a8", "ds-w8a8", "deepseek-w8a8"]
default_model = "dsv3.1"
max_workers = 10
supports_post = true
versions = { "3" = "dsv3.1", "3.1" = "dsv3.1" }

