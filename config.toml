[provider_mappings.qwen]
provider = "qwen"
aliases = ["qw", "qwen"]
default_model = "qwen3.5-397b-a17b"
max_workers = 10
supports_post = false
versions = { "3" = "qwen3.5-397b-a17b", "3.5" = "qwen3.5-397b-a17b", "qwen3.5" = "qwen3.5-397b-a17b" }

[provider_mappings.gpt]
provider = "qwen"
aliases = ["gpt", "gpt4", "gpt-4", "gpt-4o", "gpt4o", "gpt-4o-mini", "gpt4o-mini"]
default_model = "gpt-4o-mini"
max_workers = 10
supports_post = false
versions = { "4" = "gpt-4o-mini" }

[provider_mappings."qwen-vl"]
provider = "qwen-vl"
aliases = ["qw-vl", "qwen-vl", "qw-v", "qwen-v", "qwvl", "qwenvl", "qwv", "qwenv"]
default_model = "Qwen3-VL-235B-A22B-Instruct"
max_workers = 4
supports_post = true
versions = { "3" = "Qwen3-VL-235B-A22B-Instruct", "3-vl" = "Qwen3-VL-235B-A22B-Instruct", "3-v" = "Qwen3-VL-235B-A22B-Instruct", "3vl" = "Qwen3-VL-235B-A22B-Instruct", "3v" = "Qwen3-VL-235B-A22B-Instruct" }

[provider_mappings.zhipu]
provider = "zhipu"
aliases = ["zp", "zhipu"]
default_model = "glm-4-flash"
max_workers = 100
supports_post = true
versions = { "4" = "glm-4-flash" }

[provider_mappings."zhipu-vl"]
provider = "zhipu-vl"
aliases = ["zp-vl", "zhipu-vl", "zp-v", "zhipu-v", "zpvl", "zhipuvl", "zpv", "zhipuv"]
default_model = "glm-4v-flash"
max_workers = 10
supports_post = true
versions = { "4" = "glm-4v-flash" }
